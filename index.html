        {showAddStore && (
          <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", zIndex:800, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
            <div style={{ background:"#fff", borderRadius:"20px 20px 0 0", width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto", padding:"20px 16px 40px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <div style={{ fontSize:16, fontWeight:800, color:"#0a2850" }}>إضافة متجر</div>
                <button onClick={() => setShowAddStore(false)} style={{ background:"#f0f4f8", border:"none", borderRadius:8, width:32, height:32, fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
              </div>
              <Field label="اسم المتجر" required>
                <Input value={storeForm.name} onChange={e => setStoreForm(f=>({...f,name:e.target.value}))} />
              </Field>
              <Field label="اسم المسؤول">
                <Input value={storeForm.manager} onChange={e => setStoreForm(f=>({...f,manager:e.target.value}))} />
              </Field>
              <Field label="رقم الهاتف">
                <Input type="tel" value={storeForm.phone} onChange={e => setStoreForm(f=>({...f,phone:e.target.value}))} />
              </Field>
              <Field label="أيام التواجد">
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {DAYS.map(d => (
                    <button key={d} onClick={() => toggleStoreDay(d)} style={{ padding:"6px 12px", borderRadius:20, border:"1.5px solid", borderColor:storeForm.days?.includes(d)?"#1976d2":"#d0e4f0", background:storeForm.days?.includes(d)?"#e8f4fd":"#f8fbff", color:storeForm.days?.includes(d)?"#1976d2":"#9ab", fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>{d}</button>
                  ))}
                </div>
              </Field>
              <div style={{ display:"flex", alignItems:"center", gap:8, background:"#f8fbff", border:"1.5px solid #d0e4f0", borderRadius:12, padding:"6px 12px", marginBottom:14 }}>
                <span style={{ fontSize:12, color:"#9ab", fontWeight:600, whiteSpace:"nowrap" }}>من</span>
                <input type="time" value={storeForm.fromTime} onChange={e => setStoreForm(f=>({...f,fromTime:e.target.value}))} style={{ flex:1, border:"none", fontSize:13, color:"#0a2850", background:"transparent", outline:"none", fontFamily:"inherit" }} />
                <span style={{ fontSize:12, color:"#d0e4f0" }}>|</span>
                <span style={{ fontSize:12, color:"#9ab", fontWeight:600, whiteSpace:"nowrap" }}>إلى</span>
                <input type="time" value={storeForm.toTime} onChange={e => setStoreForm(f=>({...f,toTime:e.target.value}))} style={{ flex:1, border:"none", fontSize:13, color:"#0a2850", background:"transparent", outline:"none", fontFamily:"inherit" }} />
              </div>
              <Field label="الموقع / العنوان">
                <Input value={storeForm.location} onChange={e => setStoreForm(f=>({...f,location:e.target.value}))} />
              </Field>
              <div style={{ display:"flex", gap:10, marginTop:8 }}>
                <button onClick={() => setShowAddStore(false)} style={{ flex:1, background:"#f0f4f8", border:"none", borderRadius:12, padding:12, fontSize:14, fontWeight:600, color:"#5a8db5", cursor:"pointer", fontFamily:"inherit" }}>إلغاء</button>
                <button onClick={saveNewStore} style={{ flex:2, background:"linear-gradient(135deg,#1565c0,#1976d2)", border:"none", borderRadius:12, padding:12, fontSize:14, fontWeight:800, color:"#fff", cursor:"pointer", fontFamily:"inherit" }}>✓ حفظ المتجر</button>
              </div>
            </div>
          </div>
        )}

        {/* Notes - small */}
        <div style={{ background:"#fff", borderRadius:12, padding:"10px 14px", boxShadow:"0 1px 6px rgba(10,40,80,0.06)" }}>
          <input value={form.notes||""} onChange={e => setForm(f=>({...f,notes:e.target.value}))}
            placeholder="ملاحظات..."
            style={{ width:"100%", border:"none", outline:"none", fontSize:13, color:"#0a2850", background:"transparent", fontFamily:"inherit" }} />
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <button onClick={saveSurvey} style={{ background:"linear-gradient(135deg,#2e7d32,#43a047)", border:"none", borderRadius:14, padding:"14px 10px", color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"inherit", lineHeight:1.4 }}>
            ✓ حفظ الاستطلاع
          </button>
          <button onClick={() => {
            if (!form.storeName) return;
            const newSeq = nextSeq(surveys);
            const newSurvey = { ...form, seq: newSeq, goToOrders: true };
            const updated = [newSurvey, ...surveys];
            saveSurveys(updated);
            setForm(emptyForm()); setStoreSearch(""); setShowForm(false);
            if (goToOrdersAdd) goToOrdersAdd(newSurvey.id); else setPage("orders");
          }} style={{ background:"linear-gradient(135deg,#1565c0,#1976d2)", border:"none", borderRadius:14, padding:"14px 10px", color:"#fff", fontSize:13, fontWeight:800, cursor:"pointer", fontFamily:"inherit", lineHeight:1.4, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
            <span>حفظ</span>
            <span style={{ fontSize:11, opacity:0.9 }}>+ الطلبيات →</span>
          </button>
        </div>

        {/* Rejection button / reason */}
        {!form._showReject ? (
          <button onClick={() => setForm(f => ({...f, _showReject: true}))}
            style={{ width:"100%", background:"linear-gradient(135deg,#c62828,#e53935)", border:"none", borderRadius:14, padding:"13px", color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            رفض التعامل
          </button>
        ) : (
          <div style={{ background:"#fff5f5", borderRadius:14, padding:14, border:"2px solid #e53935" }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#c62828", marginBottom:10 }}>سبب رفض التعامل</div>
            <div style={{ display:"flex", gap:8 }}>
              <textarea
                autoFocus
                value={form._rejectReason || ""}
                onChange={e => setForm(f => ({...f, _rejectReason: e.target.value}))}
                placeholder="اكتب سبب الرفض..."
                rows={2}
                style={{ flex:1, padding:"10px 12px", border:"1.5px solid #e53935", borderRadius:10, fontSize:13, color:"#0a2850", outline:"none", fontFamily:"inherit", resize:"none" }} />
              <button
                onClick={() => {
                  if (!form.storeName) return;
                  const reason = form._rejectReason || "رفض التعامل";
                  const rejection = {
                    id: Date.now().toString(),
                    storeId: form.storeId || form.storeName,
                    storeName: form.storeName,
                    reason,
                    manager: form.manager,
                    phone: form.phone,
                    date: new Date().toISOString().slice(0,10),
                  };
                  setData(d => ({ ...d, orders: { ...d.orders, rejected: [...(d.orders.rejected||[]), rejection] } }));
                  const newSeq = nextSeq(surveys);
                  const updated = [{ ...form, seq: newSeq, rejected: true, rejectReason: reason }, ...surveys];
                  saveSurveys(updated);
                  setForm(emptyForm()); setStoreSearch(""); setShowForm(false);
                }}
                style={{ background:"#e53935", border:"none", borderRadius:10, padding:"0 14px", color:"#fff", fontSize:20, fontWeight:900, cursor:"pointer", flexShrink:0 }}>
                ✓
              </button>
            </div>
            <button onClick={() => setForm(f => ({...f, _showReject: false, _rejectReason: ""}))}
              style={{ marginTop:8, background:"none", border:"none", fontSize:12, color:"#9ab", cursor:"pointer", fontFamily:"inherit" }}>
              إلغاء
            </button>
          </div>
        )}
      </div>
    </div>
  );

  // ── List Screen ──
  const today = new Date().toISOString().slice(0,10);
  const rejectedSurveys   = surveys.filter(sv => sv.rejected);
  const followUpSurveys   = surveys.filter(sv => !sv.rejected && !sv.goToOrders && sv.products?.length > 0);
  const todayStr2 = new Date().toISOString().slice(0,10);
  const allTodayOrders    = [...(data.orders?.warehouse||[]), ...(data.orders?.direct||[])].filter(o => o.date === todayStr2);
  // Include surveys with goToOrders OR any survey whose store has orders today
  const orderedSurveys    = surveys.filter(sv => {
    if (sv.rejected) return false;
    if (sv.goToOrders) return true;
    return allTodayOrders.some(o => o.storeId === sv.storeId);
  });
  // Virtual entries for stores with orders today but NO survey
  const surveyedStoreIds  = new Set(surveys.map(sv => sv.storeId).filter(Boolean));
  const virtualOrdered    = allTodayOrders
    .filter(o => o.storeId && !surveyedStoreIds.has(o.storeId))
    .reduce((acc, o) => {
      if (!acc.find(x=>x.storeId===o.storeId)) {
        const store = data.stores.find(s=>s.id===o.storeId);
        acc.push({ id:'virt-'+o.storeId, storeId:o.storeId, storeName: store?.name||o.storeId, date:o.date, _virtual:true });
      }
      return acc;
    }, []);
  const allOrderedEntries = [...orderedSurveys, ...virtualOrdered];

  const surveyTabs = [
    { key:"add",       label:"إضافة",              count: null,                    color:"#1565c0" },
    { key:"rejected",  label:"غير مكتملة",          count: rejectedSurveys.length,  color:"#e53935" },
    { key:"followup",  label:"متابعة",              count: followUpSurveys.length,  color:"#e65100" },
    { key:"ordered",   label:"طلبيات جديدة",        count: allOrderedEntries.length,   color:"#2e7d32" },
  ];

  const printVisible = () => {
    const list = surveyTab==="rejected" ? rejectedSurveys : surveyTab==="followup" ? followUpSurveys : surveyTab==="ordered" ? allOrderedEntries : surveys.filter(sv=>sv.date===today);
    printAll(list, surveyTab);
  };

  return (
    <div>
      <BackBtn onClick={() => setPage("home")} />
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <h2 style={{ margin:0, fontSize:18, color:"#0a2850" }}>الاستطلاع</h2>
        <div style={{ display:"flex", gap:8 }}>
          {surveyTab !== "add" && surveys.length > 0 && (
            <button onClick={printVisible}
              style={{ background:"#e8f4fd", border:"none", borderRadius:10, padding:"8px 12px", color:"#1565c0", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
              طباعة
            </button>
          )}
          <button onClick={() => { setForm(emptyForm()); setStoreSearch(""); setShowForm(true); setSurveyTab("add"); }}
            style={{ background:"linear-gradient(135deg,#1565c0,#1976d2)", border:"none", borderRadius:10, padding:"8px 14px", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
            + جديد
          </button>
        </div>
      </div>

      <ConfirmDelete open={!!deleteId} message="حذف هذا الاستطلاع؟"
        onConfirm={() => { saveSurveys(surveys.filter(s=>s.id!==deleteId)); setDeleteId(null); }}
        onCancel={() => setDeleteId(null)} />

      {/* 4 Tabs */}
      <div style={{ display:"flex", gap:4, marginBottom:16, background:"#e8f4fd", borderRadius:14, padding:4 }}>
        {surveyTabs.map(t => (
          <button key={t.key} onClick={() => setSurveyTab(t.key)}
            style={{ flex:1, padding:"8px 2px", background: surveyTab===t.key?"#fff":"transparent", border:"none", borderRadius:10,
              fontSize:10, fontWeight: surveyTab===t.key?800:500,
              color: surveyTab===t.key ? t.color : "#5a8db5",
              cursor:"pointer", fontFamily:"inherit",
              boxShadow: surveyTab===t.key?"0 2px 8px rgba(10,40,80,0.1)":"none",
              display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
            <span style={{ fontSize:11 }}>{t.label}</span>
            {t.count !== null && (
              <span style={{ background: surveyTab===t.key ? t.color : "#d0e4f0", color: surveyTab===t.key?"#fff":"#5a8db5", borderRadius:20, padding:"1px 7px", fontSize:10, fontWeight:800 }}>
                {t.count}
              </span>
            )}
          </button>
        ))}
      </div>

      {/* Tab: Add — show new survey form trigger */}
      {surveyTab === "add" && (
        <div>
          <div style={{ textAlign:"center", padding:"30px 0" }}>
            <div style={{ color:"#1565c0", marginBottom:12 }}><Icon name="survey" size={48} /></div>
            <div style={{ fontSize:15, fontWeight:700, color:"#0a2850", marginBottom:8 }}>ابدأ استطلاعاً جديداً</div>
            <div style={{ fontSize:13, color:"#9ab", marginBottom:20 }}>سجّل معلومات زيارتك للمتجر</div>
            <button onClick={() => { setForm(emptyForm()); setStoreSearch(""); setShowForm(true); }}
              style={{ background:"linear-gradient(135deg,#1565c0,#1976d2)", border:"none", borderRadius:14, padding:"14px 32px", color:"#fff", fontSize:15, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>
              + إضافة استطلاع
            </button>
          </div>
          {/* Show today's surveys summary */}
          {surveys.filter(sv=>sv.date===today).length > 0 && (
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:"#5a8db5", marginBottom:10, padding:"6px 12px", background:"#f0f4f8", borderRadius:10, display:"flex", justifyContent:"space-between" }}>
                <span>استطلاعات اليوم</span>
                <span style={{ background:"#1565c0", color:"#fff", borderRadius:20, padding:"1px 8px", fontSize:11 }}>{surveys.filter(sv=>sv.date===today).length}</span>
              </div>
              {[...surveys.filter(sv=>sv.date===today)].sort((a,b)=>(b.seq||0)-(a.seq||0)).map(sv => (
                <SurveyCard key={sv.id} sv={sv} data={data} onDelete={() => setDeleteId(sv.id)} />
              ))}
            </div>
          )}
        </div>
      )}

      {/* Tab: Rejected / Incomplete */}
      {surveyTab === "rejected" && (
        <div>
          {rejectedSurveys.length === 0 ? (
            <div style={{ textAlign:"center", color:"#9ab", padding:50 }}>
              <div style={{ color:"#e53935", marginBottom:10 }}><Icon name="close" size={40}/></div>
              لا توجد تعاملات غير مكتملة
            </div>
          ) : [...rejectedSurveys].sort((a,b)=>(b.seq||0)-(a.seq||0)).map(sv => (
            <SurveyCard key={sv.id} sv={sv} data={data} onDelete={() => setDeleteId(sv.id)} />
          ))}
        </div>
      )}

      {/* Tab: Follow-up */}
      {surveyTab === "followup" && (
        <div>
          <div style={{ fontSize:12, color:"#9ab", marginBottom:12, padding:"8px 12px", background:"#fff3e0", borderRadius:10, borderRight:"3px solid #e65100" }}>
            استطلاعات تم فيها رصد مواد متوفرة وتحتاج متابعة
          </div>
          {followUpSurveys.length === 0 ? (
            <div style={{ textAlign:"center", color:"#9ab", padding:50 }}>
              <div style={{ color:"#e65100", marginBottom:10 }}><Icon name="clock" size={40}/></div>
              لا توجد متابعات حالياً
            </div>
          ) : [...followUpSurveys].sort((a,b)=>(b.seq||0)-(a.seq||0)).map(sv => (
            <SurveyCard key={sv.id} sv={sv} data={data} onDelete={() => setDeleteId(sv.id)} />
          ))}
        </div>
      )}

      {/* Tab: Ordered */}
      {surveyTab === "ordered" && (
        <div>
          {allOrderedEntries.length === 0 ? (
            <div style={{ textAlign:"center", color:"#9ab", padding:50 }}>
              <div style={{ color:"#2e7d32", marginBottom:10 }}><Icon name="orders" size={40}/></div>
              لا توجد طلبيات جديدة بعد
            </div>
          ) : (() => {
            const allOrders = [...(data.orders.warehouse||[]), ...(data.orders.direct||[])];
            const getProduct = (id) => data.products.find(p => p.id === id);
            const getWarehouse = (id) => data.warehouses.find(w => w.id === id);
            const deleteOrder = (orderId, tab) => {
              setData(d => ({ ...d, orders: { ...d.orders, [tab]: (d.orders[tab]||[]).filter(o=>o.id!==orderId) } }));
            };

            const buildRows = (orders) => orders.map((o, i) => {
              const items = o.items || [{ productId: o.productId, qty: o.qty, gift: o.gift, total: o.total }];
              const orderTab = (data.orders.warehouse||[]).find(x=>x.id===o.id) ? "warehouse" : "direct";
              return (
                <div key={o.id}>
                  {items.map((it, j) => {
                    const p = getProduct(it.productId);
                    const w = getWarehouse(o.warehouseId);
                    const itTotal = p ? +p.price * (it.qty||0) : (it.total||0);
                    const unitPrice = it.qty > 0 ? Math.round(itTotal / it.qty) : (p?.price||0);
                    return (
                      <div key={`${i}-${j}`} style={{ display:"grid", gridTemplateColumns:"20px 1fr 45px 28px 50px 60px 28px", padding:"7px 10px", gap:4, borderBottom:"1px solid #f0f4f8", background:i%2===0?"#fff":"#f8fbff", alignItems:"center" }}>
                        <div style={{ fontSize:10, color:"#9ab", textAlign:"center", fontWeight:700 }}>{o.seq||i+1}</div>
                        <div style={{ fontSize:11, color:"#0a2850", fontWeight:600 }}>{p?.name||"—"}</div>
                        <div style={{ fontSize:10, color:"#9ab", textAlign:"center" }}>{w?.name||"—"}</div>
                        <div style={{ fontSize:12, color:"#0a2850", textAlign:"center", fontWeight:700 }}>{it.qty||0}</div>
                        <div style={{ fontSize:11, color:"#5a8db5", textAlign:"center" }}>{unitPrice.toLocaleString()}</div>
                        <div style={{ fontSize:12, color:"#1565c0", fontWeight:800, textAlign:"center" }}>{itTotal.toLocaleString()}</div>
                        {j === 0 && (
                          <button onClick={() => deleteOrder(o.id, orderTab)}
                            style={{ background:"#fdecea", border:"none", borderRadius:6, padding:"4px 6px", cursor:"pointer", color:"#e53935" }}>
                            <Icon name="trash" size={12} />
                          </button>
                        )}
                        {j > 0 && <div />}
                      </div>
                    );
                  })}
                </div>
              );
            });

            return [...allOrderedEntries].sort((a,b)=>(b.seq||0)-(a.seq||0)).map(sv => {
              const storeOrders = allOrders.filter(o => o.storeId === sv.storeId && o.date === sv.date);
              const storeTotal = storeOrders.reduce((sum,o) => sum + (o.total||0), 0);
              return (
                <div key={sv.id} style={{ background:"#fff", borderRadius:16, marginBottom:14, boxShadow:"0 2px 12px rgba(10,40,80,0.08)", overflow:"hidden" }}>
                  <div style={{ background:"linear-gradient(135deg,#1565c0,#1976d2)", padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div style={{ fontWeight:800, fontSize:15, color:"#fff" }}>{sv.storeName}</div>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ fontSize:11, color:"rgba(255,255,255,0.8)" }}>#{sv.seq} • {sv.date}</div>
                      <button onClick={() => saveSurveys(surveys.filter(s=>s.id!==sv.id))} style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:8, padding:"5px 8px", cursor:"pointer", color:"#fff" }}>
                        <Icon name="trash" size={14} />
                      </button>
                    </div>
                  </div>
                  {storeOrders.length > 0 ? (
                    <>
                      <div style={{ display:"grid", gridTemplateColumns:"20px 1fr 45px 28px 50px 60px 28px", background:"#e8f4fd", padding:"7px 10px", gap:4 }}>
                        {["#","المادة","المذخر","ع","المفرد","الكلي",""].map(h => (
                          <div key={h} style={{ fontSize:10, fontWeight:700, color:"#1565c0", textAlign:"center" }}>{h}</div>
                        ))}
                      </div>
                      {buildRows(storeOrders)}
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"#e8f4fd", padding:"9px 14px" }}>
                        <span style={{ fontSize:12, fontWeight:700, color:"#0a2850" }}>إجمالي {sv.storeName}</span>
                        <span style={{ fontSize:14, fontWeight:900, color:"#1565c0" }}>{storeTotal.toLocaleString()} د.ع</span>
                      </div>
                    </>
                  ) : (
                    <div style={{ padding:12, textAlign:"center", color:"#9ab", fontSize:12 }}>لم تُسجَّل طلبية لهذا المتجر بعد</div>
                  )}
                </div>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
};

const GiftsPage = ({ data, setData, setPage }) => {
  const visibleProducts = (data.products || []).filter(p => !p.hidden);
  const companies = [...new Set(visibleProducts.map(p => p.type).filter(Boolean))];
  const [tab, setTab] = useState("add");
  const [storeSearch, setStoreSearch] = useState("");
  const [selectedStore, setSelectedStore] = useState(null);
  const [showStoreDrop, setShowStoreDrop] = useState(false);
  const [items, setItems] = useState([]);
  const [showProductPicker, setShowProductPicker] = useState(false);
  const [selectedCompany, setSelectedCompany] = useState(null);
  const [deleteId, setDeleteId] = useState(null);

  const filteredStores = (data.stores || []).filter(s => s.name?.includes(storeSearch));
  const selectStore = (s) => { setSelectedStore(s); setStoreSearch(s.name); setShowStoreDrop(false); };
  const toggleProduct = (p) => {
    setItems(prev => {
      const exists = prev.find(x => x.productId === p.id);
      if (exists) return prev.filter(x => x.productId !== p.id);
      return [...prev, { productId: p.id, giftQty: "" }];
    });
  };
  const setGiftQtyItem = (productId, val) => setItems(prev => prev.map(x => x.productId === productId ? { ...x, giftQty: val } : x));

  const saveGift = () => {
    if (!selectedStore || items.length === 0) return;
    const validItems = items.filter(it => it.giftQty && parseInt(it.giftQty) > 0);
    if (validItems.length === 0) return;
    const record = {
      id: Date.now().toString(),
      storeId: selectedStore.id, storeName: selectedStore.name, storeLocation: selectedStore.location || "",
      items: validItems.map(it => { const p = data.products.find(x => x.id === it.productId); return { productId: it.productId, productName: p?.name || "", giftQty: parseInt(it.giftQty) }; }),
      date: new Date().toISOString().slice(0, 10), delivered: false,
    };
    setData(d => ({ ...d, giftRecords: [...(d.giftRecords || []), record] }));
    setSelectedStore(null); setStoreSearch(""); setItems([]);
    setTab("pending");
  };

  const markDelivered = (id) => setData(d => ({ ...d, giftRecords: (d.giftRecords||[]).map(r => r.id===id ? {...r, delivered:true} : r) }));
  const giftRecords = data.giftRecords || [];
  const pending = [...giftRecords].filter(r => !r.delivered).reverse();
  const delivered = [...giftRecords].filter(r => r.delivered).reverse();
  const tabs = [
    { key:"add", label:"إضافة", count: null },
    { key:"pending", label:"غير مسلمة", count: pending.length },
    { key:"delivered", label:"مسلمة", count: delivered.length },
  ];

  const RecordCard = ({ r, showDeliver }) => (
    <div style={{ background:"#fff", borderRadius:14, padding:"12px 14px", marginBottom:10, boxShadow:"0 2px 8px rgba(10,40,80,0.07)", border: r.delivered?"2px solid #c8e6c9":"2px solid #ffe0b2" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
        <div>
          <div style={{ fontWeight:700, fontSize:15, color:"#0a2850" }}>{r.storeName}</div>
          {r.storeLocation && <div style={{ fontSize:11, color:"#9ab" }}>{r.storeLocation}</div>}
          <div style={{ fontSize:11, color:"#9ab", marginTop:2 }}>{r.date}</div>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          {showDeliver && (
            <button onClick={() => markDelivered(r.id)}
              style={{ background:"#e8f5e9", border:"2px solid #4caf50", borderRadius:10, padding:"7px 12px", cursor:"pointer", color:"#2e7d32", fontSize:18, fontWeight:900, lineHeight:1 }}>
              ✓
            </button>
          )}
          <button onClick={() => setDeleteId(r.id)} style={{ background:"#fdecea", border:"none", borderRadius:10, padding:"7px 10px", cursor:"pointer", color:"#e53935" }}>
            <Icon name="trash" size={15} />
          </button>
        </div>
      </div>
      {(r.items || (r.productName ? [{productName:r.productName, giftQty:r.giftQty}] : [])).map((it, idx) => (
        <div key={idx} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 10px", background: r.delivered?"#e8f5e9":"#fff8e1", borderRadius:8, marginBottom:4 }}>
          <span style={{ fontSize:12, color:"#0a2850", fontWeight:600 }}>{it.productName}</span>
          <span style={{ fontSize:15, fontWeight:900, color: r.delivered?"#2e7d32":"#e65100" }}>{it.giftQty}</span>
        </div>
      ))}
    </div>
  );

  if (showProductPicker) return (
    <div style={{ position:"fixed", inset:0, background:"#f4f8fc", zIndex:500, display:"flex", flexDirection:"column" }}>
      <div style={{ background:"linear-gradient(135deg,#1565c0,#1976d2)", padding:"16px", display:"flex", alignItems:"center", gap:10 }}>
        <button onClick={() => { setShowProductPicker(false); setSelectedCompany(null); }} style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:10, width:36, height:36, color:"#fff", fontSize:18, cursor:"pointer" }}>✕</button>
        <div style={{ color:"#fff", fontWeight:800, fontSize:16 }}>{selectedCompany || "اختر الشركة"}</div>
        {items.length > 0 && <span style={{ marginRight:"auto", background:"rgba(255,255,255,0.25)", borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#fff" }}>{items.length} مادة</span>}
      </div>
      {!selectedCompany ? (
        <div style={{ flex:1, overflowY:"auto", padding:14 }}>
          {companies.map(co => {
            const c = getCompanyColor(co);
            const count = visibleProducts.filter(p => p.type === co).length;
            const selCount = items.filter(it => { const p = data.products.find(x=>x.id===it.productId); return p?.type===co; }).length;
            return (
              <button key={co} onClick={() => setSelectedCompany(co)} style={{ width:"100%", padding:"16px 18px", borderRadius:16, border:"none", background:c.light, color:c.text, fontSize:15, fontWeight:800, cursor:"pointer", fontFamily:"inherit", textAlign:"right", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <span>{co}</span><span style={{ fontSize:12, opacity:0.8 }}>{selCount > 0 ? "✓"+selCount+" / " : ""}{count} منتج ◀</span>
              </button>
            );
          })}
        </div>
      ) : (
        <div style={{ flex:1, overflowY:"auto", padding:14 }}>
          <button onClick={() => setSelectedCompany(null)} style={{ background:"#f0f4f8", border:"none", borderRadius:10, padding:"7px 12px", fontSize:12, fontWeight:700, color:"#5a8db5", cursor:"pointer", fontFamily:"inherit", marginBottom:12 }}>← رجوع</button>
          {visibleProducts.filter(p => p.type === selectedCompany).map(p => {
            const sel = items.find(x => x.productId === p.id);
            return (
              <div key={p.id} style={{ background:"#fff", borderRadius:14, padding:"12px 14px", marginBottom:10, border:"2px solid "+(sel?"#1976d2":"#e8f0f8"), display:"flex", alignItems:"center", gap:12 }}>
                <button onClick={() => toggleProduct(p)} style={{ width:28, height:28, borderRadius:8, border:"2px solid "+(sel?"#1976d2":"#d0e4f0"), background:sel?"#1976d2":"#fff", color:"#fff", fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{sel ? "✓" : ""}</button>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:13, color:"#0a2850" }}>{p.name}</div>
                  {p.giftRate > 0 && <div style={{ fontSize:11, color:"#2e7d32" }}> 10+{Math.round(p.giftRate/10)}</div>}
                </div>
                {sel && <input type="text" inputMode="numeric" placeholder="هدايا" value={sel.giftQty} onChange={e => setGiftQtyItem(p.id, e.target.value.replace(/[^0-9]/g,""))} style={{ width:65, padding:"6px 8px", border:"1.5px solid #1976d2", borderRadius:8, fontSize:16, fontWeight:800, color:"#2e7d32", textAlign:"center", fontFamily:"inherit", outline:"none" }} />}
              </div>
            );
          })}
        </div>
      )}
      <div style={{ padding:14 }}>
        <button onClick={() => { setShowProductPicker(false); setSelectedCompany(null); }} style={{ width:"100%", background:"linear-gradient(135deg,#1565c0,#1976d2)", border:"none", borderRadius:14, padding:14, color:"#fff", fontSize:15, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>
          ✓ تأكيد ({items.length} مادة)
        </button>
      </div>
    </div>
  );

  return (
    <div>
      <BackBtn onClick={() => setPage("home")} />
      <h2 style={{ margin:"0 0 14px", fontSize:18, color:"#0a2850" }}>الهدايا المستحقة</h2>
      <ConfirmDelete open={!!deleteId} message="حذف هذا السجل؟"
        onConfirm={() => { setData(d => ({...d, giftRecords:(d.giftRecords||[]).filter(r=>r.id!==deleteId)})); setDeleteId(null); }}
        onCancel={() => setDeleteId(null)} />

      <div style={{ display:"flex", gap:6, marginBottom:16, background:"#e8f4fd", borderRadius:14, padding:4 }}>
        {tabs.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            style={{ flex:1, padding:"9px 4px", background: tab===t.key?"#fff":"transparent", border:"none", borderRadius:10, fontSize:11, fontWeight: tab===t.key?800:500, color: tab===t.key?"#1565c0":"#5a8db5", cursor:"pointer", fontFamily:"inherit", boxShadow: tab===t.key?"0 2px 8px rgba(10,40,80,0.1)":"none", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
            <span>{t.label}</span>
            {t.count !== null && <span style={{ fontSize:10, fontWeight:800, color: t.key==="pending"&&t.count>0?"#e65100":"#1565c0" }}>{t.count}</span>}
          </button>
        ))}
      </div>

      {tab === "add" && (
        <div style={{ background:"#fff", borderRadius:16, padding:14, boxShadow:"0 2px 12px rgba(10,40,80,0.08)" }}>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#1565c0", marginBottom:6 }}> اسم المتجر</div>
            <div style={{ position:"relative" }}>
              <input value={storeSearch} onChange={e => { setStoreSearch(e.target.value); setShowStoreDrop(true); setSelectedStore(null); }} onFocus={() => setShowStoreDrop(true)} placeholder="ابحث عن متجر..." style={{ width:"100%", padding:"10px 12px", border:"1.5px solid #d0e4f0", borderRadius:10, fontSize:14, color:"#0a2850", outline:"none", boxSizing:"border-box", fontFamily:"inherit" }} />
              {showStoreDrop && storeSearch.length > 0 && (
                <div style={{ position:"absolute", top:"100%", right:0, left:0, background:"#fff", border:"1px solid #d0e4f0", borderRadius:12, zIndex:100, boxShadow:"0 8px 24px rgba(0,0,0,0.12)", maxHeight:200, overflowY:"auto", marginTop:4 }}>
                  {filteredStores.map(s => (<button key={s.id} onClick={() => selectStore(s)} style={{ width:"100%", padding:"10px 14px", border:"none", borderBottom:"1px solid #f0f4f8", background:"none", textAlign:"right", fontSize:14, color:"#0a2850", cursor:"pointer", fontFamily:"inherit", display:"flex", justifyContent:"space-between" }}><span>{s.name}</span>{s.location && <span style={{ fontSize:11, color:"#9ab" }}>{s.location}</span>}</button>))}
                  {filteredStores.length===0 && <div style={{ padding:"10px 14px", fontSize:13, color:"#9ab" }}>لا توجد نتائج</div>}
                </div>
              )}
            </div>
            {selectedStore?.location && <div style={{ fontSize:12, color:"#5a8db5", marginTop:6, padding:"6px 10px", background:"#f0f6ff", borderRadius:8 }}>{selectedStore.location}</div>}
          </div>
          <div style={{ marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#1565c0" }}> المواد والهدايا</div>
              <button onClick={() => setShowProductPicker(true)} style={{ background:"#e3f2fd", border:"none", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, color:"#1565c0", cursor:"pointer", fontFamily:"inherit" }}>
                {items.length > 0 ? "✎ تعديل ("+items.length+")" : "+ اختر المواد"}
              </button>
            </div>
            {items.length > 0 ? (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {items.map(it => {
                  const p = data.products.find(x => x.id === it.productId);
                  return p ? (
                    <div key={it.productId} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"#f8fbff", borderRadius:10, padding:"8px 12px" }}>
                      <div><div style={{ fontSize:13, color:"#0a2850", fontWeight:600 }}>{p.name}</div>{p.giftRate > 0 && <div style={{ fontSize:11, color:"#2e7d32" }}> 10+{Math.round(p.giftRate/10)}</div>}</div>
                      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                        <input type="text" inputMode="numeric" value={it.giftQty} onChange={e => setGiftQtyItem(it.productId, e.target.value.replace(/[^0-9]/g,""))} placeholder="0" style={{ width:60, padding:"6px 8px", border:"1.5px solid #c8e6c9", borderRadius:8, fontSize:16, fontWeight:800, color:"#2e7d32", textAlign:"center", fontFamily:"inherit", outline:"none" }} />
                        <span style={{ fontSize:11, color:"#9ab" }}>قطعة</span>
                      </div>
                    </div>
                  ) : null;
                })}
              </div>
            ) : <div style={{ textAlign:"center", color:"#9ab", fontSize:13, padding:"10px 0" }}>لم يتم اختيار مواد بعد</div>}
          </div>
          <button onClick={saveGift} disabled={!selectedStore||items.length===0}
            style={{ width:"100%", background:selectedStore&&items.length>0?"linear-gradient(135deg,#2e7d32,#43a047)":"#e0e0e0", border:"none", borderRadius:12, padding:14, color:selectedStore&&items.length>0?"#fff":"#aaa", fontSize:15, fontWeight:800, cursor:selectedStore&&items.length>0?"pointer":"default", fontFamily:"inherit" }}>
            ✓ تسجيل الهدايا
          </button>
        </div>
      )}

      {tab === "pending" && (
        <div>
          {pending.length === 0 ? (
            <div style={{ textAlign:"center", color:"#9ab", padding:50, fontSize:14 }}><div style={{ fontSize:40, marginBottom:10 }}></div>لا توجد هدايا معلقة</div>
          ) : pending.map(r => <RecordCard key={r.id} r={r} showDeliver={true} />)}
        </div>
      )}

};
function App() {
  const [data, setDataRaw] = useState(() => load() || DEFAULT_DATA);
  const [page, setPage] = useState("home");
  const [sheetOpen, setSheetOpen] = useState(false);
  const [autoOpenOrders, setAutoOpenOrders] = useState(false);
  const [pendingSurveyId, setPendingSurveyId] = useState(null);

  const goToOrdersAdd = (surveyId) => { setAutoOpenOrders(true); setPendingSurveyId(surveyId||null); setPage("orders"); };
  const setPageCustom = (p) => { if (p !== "orders") { setAutoOpenOrders(false); setPendingSurveyId(null); } setPage(p); };
  const setData = (updater) => {
    setDataRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      save(next);
      return next;
    });
  };
  useEffect(() => {
    const doAutoSave = (currentData) => {
      const todayStr = new Date().toISOString().slice(0, 10);
      const lastSave = localStorage.getItem("lastAutoSaveDate");
      const src = currentData || JSON.parse(localStorage.getItem("salesAppData") || "{}");
      const allOrd = [...(src.orders?.warehouse||[]),...(src.orders?.direct||[])];
      const todayOrds = allOrd.filter(o => o.date === todayStr);
      if (todayOrds.length === 0) return; // nothing to save
      const todayRej = (src.orders?.rejected||[]).filter(o => o.date === todayStr);
      const byP = {}; todayOrds.forEach(o => { const p = (src.products||[]).find(x=>x.id===o.productId); if(!p) return; if(!byP[p.name]) byP[p.name]={qty:0,total:0}; byP[p.name].qty+=o.qty||0; byP[p.name].total+=o.total||0; });
      const byS = {}; todayOrds.forEach(o => { const s = (src.stores||[]).find(x=>x.id===o.storeId); const n=s?.name||o.storeId; if(!byS[n]) byS[n]={qty:0,total:0}; byS[n].qty+=o.qty||0; byS[n].total+=o.total||0; });
      const summary = { id:`daily-${todayStr}`, type:"daily", date:todayStr, autoSaved:true, totalSales:todayOrds.reduce((a,o)=>a+(o.total||0),0), totalQty:todayOrds.reduce((a,o)=>a+(o.qty||0),0), soldStores:new Set(todayOrds.map(o=>o.storeId)).size, rejectedCount:todayRej.length, byProduct:byP, byStore:byS };
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
      const cutoffStr = cutoff.toISOString().slice(0,10);
      const existing = src.reports||[];
      const archived = existing.filter(r=>r.date<cutoffStr).map(r=>({...r,archived:true}));
      const active = existing.filter(r=>r.date>=cutoffStr&&r.id!==summary.id);
      const newReports = [...active, summary, ...archived];
      const next = {...src, reports:newReports};
      localStorage.setItem("salesAppData", JSON.stringify(next));
      localStorage.setItem("lastAutoSaveDate", todayStr);
      setDataRaw(next);
    };
    doAutoSave(null);
    const handleVisibilityChange = () => {
      if (document.visibilityState === "hidden") {
        doAutoSave(null);
      }
    };
    const handleBeforeUnload = () => doAutoSave(null);
    document.addEventListener("visibilitychange", handleVisibilityChange);
    window.addEventListener("beforeunload", handleBeforeUnload);
    window.addEventListener("pagehide", handleBeforeUnload);
    return () => {
      document.removeEventListener("visibilitychange", handleVisibilityChange);
      window.removeEventListener("beforeunload", handleBeforeUnload);
      window.removeEventListener("pagehide", handleBeforeUnload);
    };
  }, []);
  const pages = {

<script>
(function() {
  const CACHE_KEY = 'compiled_app_v62';
  const src = document.getElementById('app-source').textContent;
  const cached = localStorage.getItem(CACHE_KEY);

  function runCode(compiledCode) {
    const s = document.createElement('script');
    s.textContent = compiledCode;
    document.head.appendChild(s);
  }

  if (cached) {
    // Use cached compiled code immediately - no Babel needed
    runCode(cached);
  } else {
    // First time: compile with Babel and cache result
    const result = Babel.transform(src, { presets: ['react'] });
    const compiled = result.code;
    try { localStorage.setItem(CACHE_KEY, compiled); } catch(e) {}
    runCode(compiled);
  }
})();
</script>

  <!-- Service Worker for offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      const CACHE_NAME = 'sales-app-v3';

      const sw = `
        const CACHE = '${CACHE_NAME}';

        self.addEventListener('install', e => {
          self.skipWaiting();
          e.waitUntil(
            caches.open(CACHE).then(cache => {
              return cache.addAll([self.location.href]);
            })
          );
        });

        self.addEventListener('activate', e => {
          e.waitUntil(
            caches.keys().then(keys =>
              Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
            ).then(() => self.clients.claim())
          );
        });

        self.addEventListener('fetch', e => {
          if (e.request.method !== 'GET') return;
          e.respondWith(
            caches.match(e.request).then(cached => {
              if (cached) return cached;
              return fetch(e.request).then(response => {
                if (!response || response.status !== 200) return response;
                const clone = response.clone();
                caches.open(CACHE).then(cache => cache.put(e.request, clone));
                return response;
              }).catch(() => caches.match(e.request));
            })
          );
        });
      `;

      // Force re-register with new blob each time to pick up updates
      const blob = new Blob([sw], { type: 'application/javascript' });
      const url  = URL.createObjectURL(blob);

      navigator.serviceWorker.getRegistrations().then(regs => {
        Promise.all(regs.map(r => r.unregister())).then(() => {
          navigator.serviceWorker.register(url).then(reg => {
            // After registering, cache the current page immediately
            if (reg.installing) {
              reg.installing.postMessage({ type: 'SKIP_WAITING' });
            }
          }).catch(() => {});
        });
      });
    }
  </script>
